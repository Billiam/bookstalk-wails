name: Wails build

on:
  push:
    tags:
      - '*'

env:
  # Necessary for most environments as build failure can occur due to OOM issues
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  build:
    strategy:
      # Failure in one platform build won't impact the others
      fail-fast: false
      matrix:
        build:
          - name: 'App'
            platform:  'amd64'
            os: 'ubuntu-latest'
          - name: 'App'
            platform:  'amd64'
            os: 'windows-latest'
          - name: 'App'
            platform:  'universal'
            os: 'macos-latest'

    runs-on: ${{ matrix.build.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt update && sudo apt-get -yq install libwebkit2gtk-4.1-dev gcc-aarch64-linux-gnu

#      - name: Install windows prerequisite
#        if: runner.os == 'Windows'
#        shell: pwsh
#        run: |
#          $ErrorActionPreference = 'Stop'
#          Write-Host "Installing Scoop..."
#          Invoke-WebRequest -Uri "https://get.scoop.sh" -OutFile "install.ps1"
#          .\install.ps1 -RunAsAdmin
#          scoop bucket add extras
#          scoop install nsis

      - name: Setup GoLang
        uses: actions/setup-go@v6
        with:
          check-latest: true
          cache: true
          cache-dependency-path: 'go.sum'
          go-version: 1.25.9

#      - name: Install Garble
#        run: go install mvdan.cc/garble@latest
#        shell: bash
#        env:
#          OBFUSCATE: true

      # Setup and configure Node And pnpm
      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.22.1

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10
          run_install: false

      # (Optional) Setup and configure Deno
#      - name: Setup Deno
#        uses: denoland/setup-deno@v2
#        if: inputs.deno-build == 'true'
#        with:
#          deno-version: ${{inputs.deno-version}}
#      - name: Run Deno Command
#        if: inputs.deno-build == 'true'
#        shell: bash
#        working-directory: ${{inputs.deno-working-directory}}
#        run: ${{inputs.deno-build}}

      # install wails
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.74
        shell: bash

      - name: Verify Wails install
        run: wails3 doctor

      # Building step
      - name: Set App Build Info
        run: wails3 task common:update:build-assets
        shell: bash

      # Wails3 Package
      - name: Wails3 Package
        shell: bash
        run: |
          ARCHS="${{ matrix.build.platform }}"
          
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            echo "Detected macOS build"
            if [[ "$ARCHS" == *"universal"* ]]; then
              echo "Building macOS universal binary"
              wails3 task darwin:package:universal
            fi
            for arch in $(echo "$ARCHS" | tr ',' ' '); do
              arch=$(echo $arch | xargs)
              if [[ "$arch" == "amd64" || "$arch" == "arm64" ]]; then
                echo "Building macOS $arch binary"
                ARCH=$arch wails3 package
              fi
              hdiutil create -volname "BookStalk" -srcfolder bin/bookstalk.app -ov -format UDZO bin/bookstalk.dmg
              rm bin/bookstalk
              rm -r bin/bookstalk.app
            done
          elif [[ "${{ runner.os }}" == "Windows" ]]; then
            echo "Detected Windows build"
            for arch in $(echo "$ARCHS" | tr ',' ' '); do
              arch=$(echo $arch | xargs)
              if [[ "$arch" == "amd64" || "$arch" == "arm64" ]]; then
                echo "Building Windows $arch binary"
                ARCH=$arch wails3 build
              fi
            done
          elif [[ "${{ runner.os }}" == "Linux" ]]; then
            echo "Detected Linux build"
            for arch in $(echo "$ARCHS" | tr ',' ' '); do
              arch=$(echo $arch | xargs)
              if [[ "$arch" == "amd64" || "$arch" == "arm64" ]]; then
                echo "Building Linux $arch binary"
                ARCH=$arch wails3 package
                mv bin/bookstalk bin/bookstalk.linux-$arch
              fi
            done
          else
            echo "Unsupported OS: ${{ runner.os }}"
          fi


      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: bin/*
